<style>
  :root{
    --bg:#04060b;
    --ink:#cfe6ef;        /* default code */
    --kw:#ff52d9;         /* keywords  (magenta) */
    --bi:#5ef2ff;         /* builtins  (cyan)    */
    --str:#ffcf6b;        /* strings   (amber)   */
    --com:#5f6f8c;        /* comments  (slate)   */
    --num:#b78cff;        /* numbers   (violet)  */
    --cyan:#5ef2ff;
    --mag:#ff52d9;
    --hud:#7d93a8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    overflow:hidden;
    cursor:none;
  }
  #stage{position:fixed;inset:0;overflow:hidden}

  /* ---------- background texture: infinite code scroll ---------- */
  #texture{
    position:absolute; left:0; right:0; top:0;
    opacity:.30;
    filter:blur(1.1px);
    will-change:transform;
    animation:scroll 86s linear infinite;
    font-size:15px; line-height:1.55;
    padding:0 5vw;
    white-space:pre;
    color:#9fb6c4;
    text-shadow:0 0 6px rgba(94,242,255,.18), 0 0 14px rgba(255,82,217,.07);
  }
  #texture .twin{display:block}
  @keyframes scroll{ from{transform:translateY(0)} to{transform:translateY(-50%)} }

  /* token colors (shared) */
  .k{color:var(--kw)} .b{color:var(--bi)} .s{color:var(--str)}
  .c{color:var(--com);font-style:italic} .n{color:var(--num)} .i{color:var(--ink)}

  /* ---------- spotlight: focus-pull readable fragment ---------- */
  #spot{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:min(86vw,1100px);
    opacity:0;
    will-change:opacity;
  }
  .layer{
    position:absolute; left:0; top:0; width:100%;
    white-space:pre-wrap; word-break:break-word;
    font-size:clamp(18px,2.05vw,30px); line-height:1.5;
    letter-spacing:.2px;
  }
  /* the sharp, color-highlighted, readable layer */
  #sharp{position:relative; color:var(--ink);
    text-shadow:0 0 10px rgba(120,220,255,.25);}
  /* monochrome chromatic ghosts, additive */
  .ghost{mix-blend-mode:screen; pointer-events:none; opacity:.55}
  #gcyan{color:var(--cyan)}
  #gmag{color:var(--mag)}

  /* caption + version chip under the fragment */
  #meta{
    position:absolute; left:0; top:100%; margin-top:26px;
    display:flex; align-items:baseline; gap:16px;
    font-size:13px; color:var(--hud); letter-spacing:.4px;
  }
  #cap{color:#c7d6e2}
  #cap::before{content:"› "; color:var(--cyan)}
  .chip{
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    padding:3px 9px; border:1px solid rgba(125,147,168,.4); border-radius:2px;
    color:var(--hud);
  }

  /* ---------- HUD ---------- */
  .hud{position:absolute; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; color:var(--hud); user-select:none}
  #hud-tl{top:4vh; left:5vw; display:flex; align-items:center; gap:10px}
  #dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 10px var(--cyan); animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  #hud-tl .path{color:#9fb6c4; letter-spacing:1px; text-transform:none; font-size:13px}
  #cur{display:inline-block;width:8px;height:15px;background:var(--cyan);
    margin-left:2px; vertical-align:-2px; animation:blink 1.05s step-end infinite;
    box-shadow:0 0 8px var(--cyan)}
  @keyframes blink{50%{opacity:0}}
  #hud-br{bottom:4vh; right:5vw; text-align:right; line-height:1.9}
  #hud-br b{color:#9fb6c4; font-weight:500}
  #ridges{color:var(--mag)}

  /* ---------- CRT overlays ---------- */
  #scan{position:absolute; inset:0; pointer-events:none; z-index:30;
    background:repeating-linear-gradient(0deg,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,.28) 3px, rgba(0,0,0,.28) 4px);
    mix-blend-mode:multiply;}
  #beam{position:absolute; left:0; right:0; height:18vh; pointer-events:none; z-index:31;
    background:linear-gradient(180deg, rgba(94,242,255,0) 0%, rgba(94,242,255,.06) 50%, rgba(94,242,255,0) 100%);
    animation:beam 9s linear infinite}
  @keyframes beam{from{top:-20vh}to{top:120vh}}
  #vig{position:absolute; inset:0; pointer-events:none; z-index:32;
    background:radial-gradient(120% 90% at 50% 50%,
      rgba(0,0,0,0) 42%, rgba(2,3,8,.55) 78%, rgba(2,3,8,.92) 100%);}
  #tint{position:absolute; inset:0; pointer-events:none; z-index:29;
    background:radial-gradient(140% 120% at 18% 12%, rgba(255,82,217,.05), rgba(0,0,0,0) 55%),
               radial-gradient(140% 120% at 85% 90%, rgba(94,242,255,.06), rgba(0,0,0,0) 55%);}

  @media (prefers-reduced-motion: reduce){
    #texture{animation-duration:160s}
    #beam,#dot,#cur{animation:none}
  }
</style>

<script>
/* ---------------- syntax highlighter (lightweight Python) ---------------- */
const KW = new Set(["import","from","as","def","class","return","if","elif","else",
  "for","while","in","is","not","and","or","global","nonlocal","True","False","None",
  "with","try","except","finally","raise","break","continue","pass","lambda","yield"]);
const BI = new Set(["print","range","len","hasattr","int","float","str","tuple","list",
  "set","dict","abs","min","max","enumerate","isinstance","super","ValueError","self"]);

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function hl(code){
  const re = /(#[^\n]*)|([rbfRBF]{0,2}"(?:\\.|[^"\\])*"|[rbfRBF]{0,2}'(?:\\.|[^'\\])*')|(\b\d+\.?\d*\b)|([A-Za-z_]\w*)/g;
  let out="", last=0, m;
  while((m=re.exec(code))){
    out += esc(code.slice(last,m.index));
    if(m[1])      out += `<span class="c">${esc(m[1])}</span>`;
    else if(m[2]) out += `<span class="s">${esc(m[2])}</span>`;
    else if(m[3]) out += `<span class="n">${esc(m[3])}</span>`;
    else{
      const w=m[4];
      if(KW.has(w))      out += `<span class="k">${w}</span>`;
      else if(BI.has(w)) out += `<span class="b">${w}</span>`;
      else               out += `<span class="i">${esc(w)}</span>`;
    }
    last = re.lastIndex;
  }
  return out + esc(code.slice(last));
}

/* ---------------- the real material (from both versions) ---------------- */
const TEXTURE = String.raw`# ─────────────────────────  v2024  ─────────────────────────
import pyautogui

os.environ['SDL_VIDEO_WINDOW_POS'] = "0,-1080"

screen_width, screen_height = 1920, 1080
screen = pygame.display.set_mode((screen_width, screen_height), pygame.NOFRAME)
font = pygame.font.SysFont("arial", 20)

STATE_START_SCREEN     = "start_screen"
STATE_LOAD_FINGERPRINT = "fingerprint_screen"
STATE_GAME_ACTIVE      = "game_active"
game_state = STATE_START_SCREEN

def count_line_crossings(image_path):
    img = cv2.imread('Fingerprint.jpg', cv2.IMREAD_GRAYSCALE)
    if img is None:
        print("Ошибка: изображение не найдено.")
        return 0
    _, binary_img = cv2.threshold(img, 127, 255, cv2.THRESH_BINARY)
    height, width = binary_img.shape
    middle_y = height // 2
    crossings = 0
    was_black = binary_img[middle_y, 0] < 127
    for x in range(1, width):
        is_black = binary_img[middle_y, x] < 127
        if is_black != was_black:
            crossings += 1
            was_black = is_black
    return crossings // 2

def analyze_fingerprint(image_path):
    crossings = count_line_crossings(image_path)
    print(f"Линия пересекает чёрные области {crossings} раз(а).")
    return crossings

def add_static_line(space, start_pos, end_pos, thickness=5):
    body = pymunk.Body(body_type=pymunk.Body.STATIC)
    shape = pymunk.Segment(body, start_pos, end_pos, thickness)
    shape.elasticity = 0.95
    space.add(body, shape)

def add_ball(space, screen_width, screen_height, radius=6):
    mass = 1
    moment = pymunk.moment_for_circle(mass, 0, radius)
    body = pymunk.Body(mass, moment)
    body.position = (screen_width / 2, screen_height / 2)
    shape = pymunk.Circle(body, radius)
    shape.elasticity = 0.95
    space.add(body, shape)
    return body, shape

# ─────────────────────────  v2026  ─────────────────────────
import threading, win32gui, win32con

def color_to_tuple(color):
    if hasattr(color, 'a'):
        return (color.r, color.g, color.b, color.a)
    else:
        return (color.r, color.g, color.b)

class CustomDrawOptions(pymunk.pygame_util.DrawOptions):
    def draw_segment(self, p1, p2, color):
        color_tuple = color_to_tuple(color)
        # Пропускаем почти чёрные линии (невидимые стены)
        if color_tuple[0] < 10 and color_tuple[1] < 10 and color_tuple[2] < 10:
            return
        pygame.draw.aalines(self.surface, color_tuple, False, [p1, p2])

    def color_for_shape(self, shape):
        if hasattr(shape, 'shape_dynamic_color'):
            color = shape.shape_dynamic_color
            if len(color) == 3:
                return color + (255,)
            return color
        else:
            return (255, 255, 255, 0)

display_info = pygame.display.Info()
screen_width, screen_height = display_info.current_w, display_info.current_h
FINGERPRINT_PATH = os.path.join(os.path.dirname(os.path.abspath(__file__)), 'Fingerprint.jpg')
`;

/* curated readable fragments — the conceptual arc */
const FRAGS = [
  { v:"v2024", cap:"приглашение — палец как ключ", n:[40,52], code:
`start_text = font.render(
    "Отсканируйте отпечаток пальца "
    "для начала и нажмите любую клавишу",
    True, (255, 255, 255))` },
  { v:"v2024", cap:"одна линия поперёк отпечатка — считаем гребни", n:[28,41], code:
`crossings = 0
was_black = binary_img[middle_y, 0] < 127
for x in range(1, width):
    is_black = binary_img[middle_y, x] < 127
    if is_black != was_black:
        crossings += 1
        was_black = is_black
return crossings // 2` },
  { v:"v2024", cap:"палец становится числом", n:[19,25], code:
`def analyze_fingerprint(image_path):
    crossings = count_line_crossings(image_path)
    print(f"Линия пересекает чёрные области {crossings} раз(а).")
    return crossings` },
  { v:"v2024", cap:"число рождает тело — шар в центре экрана", n:[8,16], code:
`def add_ball(space, screen_width, screen_height, radius=6):
    mass = 1
    moment = pymunk.moment_for_circle(mass, 0, radius)
    body = pymunk.Body(mass, moment)

    shape.elasticity = 0.95
    return body, shape` },
  { v:"v2026", cap:"невидимые стены — есть, но не показаны", n:[33,40], code:
`def draw_segment(self, p1, p2, color):
    color_tuple = color_to_tuple(color)
    # Пропускаем почти чёрные линии (невидимые стены)
    if (color_tuple[0] < 10 and color_tuple[1] < 10

    pygame.draw.aalines(self.surface, color_tuple, False, [p1, p2])` },
  { v:"v2024", cap:"окно, спрятанное за краем экрана", n:[2,7], code:
`os.environ['SDL_VIDEO_WINDOW_POS'] = "0,-1080"
screen = pygame.display.set_mode(
    (screen_width, screen_height), pygame.NOFRAME)` },
];

/* ---------------- build texture (two copies for seamless wrap) ---------- */
const texHTML = hl(TEXTURE) + "\n\n" + hl(TEXTURE);
twinA.innerHTML = texHTML;
twinB.innerHTML = ""; // single block scrolls -50%; twinA already doubled

/* ---------------- spotlight choreography ---------------- */
const spot=document.getElementById('spot');
const sharp=document.getElementById('sharp');
const gc=document.getElementById('gcyan');
const gm=document.getElementById('gmag');
const cap=document.getElementById('cap');
const ver=document.getElementById('ver');
const vtag=document.getElementById('vtag');
const ridges=document.getElementById('ridges');

const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const CYCLE = 14000;          // ms per fragment
const IN = 1400, HOLD = 4600, OUT = 1500;  // in + hold + out, rest is dark gap
let idx = -1;

function loadFrag(i){
  const f = FRAGS[i];
  sharp.innerHTML = hl(f.code);
  gc.textContent  = f.code;     // monochrome ghosts use raw text
  gm.textContent  = f.code;
  cap.textContent = f.cap;
  ver.textContent = f.v;
  vtag.textContent = f.v;
  // a believable "ridge count" readout tied to the fragment
  const r = 13 + (i*7 % 9) + Math.floor(Math.random()*4);
  ridges.textContent = (r<10?"0":"")+r;
}

function easeInOut(t){return t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;}

let start = performance.now();
function frame(now){
  const t = (now - start);
  const phase = t % CYCLE;
  const i = Math.floor((t / CYCLE)) % FRAGS.length;
  if(i !== idx){ idx = i; loadFrag(i); }

  let opacity = 0, focus = 0;
  if(phase < IN){                       // focus pull in
    const p = easeInOut(phase/IN);
    opacity = p; focus = p;
  } else if(phase < IN+HOLD){           // hold, locked & readable
    opacity = 1; focus = 1;
  } else if(phase < IN+HOLD+OUT){       // defocus out
    const p = 1 - easeInOut((phase-IN-HOLD)/OUT);
    opacity = p; focus = p;
  } else {                              // dark gap (texture only)
    opacity = 0; focus = 0;
  }

  // chromatic split: wide when unfocused, ~1px shimmer when locked
  const shimmer = reduce ? 0 : Math.sin(now/180)*0.6;
  const off = (1-focus)*9 + (focus*shimmer);
  const blur = (1-focus)*3.2;

  spot.style.opacity = opacity.toFixed(3);
  sharp.style.filter = `blur(${blur.toFixed(2)}px)`;
  gc.style.transform = `translateX(${(-off).toFixed(2)}px)`;
  gm.style.transform = `translateX(${(off).toFixed(2)}px)`;
  const ghostOp = (focus>.99 ? .18 : .5);
  gc.style.opacity = gm.style.opacity = ghostOp.toFixed(2);

  // rare, brief glitch jitter on the whole stage
  if(!reduce && Math.random() < 0.004){
    const dx=(Math.random()-.5)*6;
    document.getElementById('stage').style.transform=`translateX(${dx}px)`;
    setTimeout(()=>{document.getElementById('stage').style.transform='';},70);
  }

  requestAnimationFrame(frame);
}
loadFrag(0); idx=0;
requestAnimationFrame(frame);
</script>
